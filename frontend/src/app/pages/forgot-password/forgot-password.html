<div class="auth-page">
    <div class="auth-box">
        <h2 class="form-title">Forgot Password</h2>

        <!-- Step 1 -->
        <div *ngIf="step === 1">
            <p class="step-desc">Enter your registered email to get a reset code.</p>
            <div class="error-box" *ngIf="errorMsg">{{ errorMsg }}</div>
            <div class="form-group">
                <input type="email" [(ngModel)]="email" placeholder="Enter your email" class="form-input" />
            </div>
            <button class="auth-btn" (click)="requestCode()" [disabled]="loading">
                {{ loading ? 'Sending...' : 'Get Reset Code' }}
            </button>
            <p class="auth-switch"><a routerLink="/login">Back to Login</a></p>
        </div>

        <!-- Step 2 -->
        <div *ngIf="step === 2">
            <div class="code-display">
                <p>Your reset code is:</p>
                <h2 class="reset-code">{{ generatedCode }}</h2>
                <p class="code-note">This code expires in 10 minutes</p>
            </div>
            <div class="error-box" *ngIf="errorMsg">{{ errorMsg }}</div>
            <div class="form-group">
                <input type="text" [(ngModel)]="code" placeholder="Enter reset code" class="form-input" />
            </div>
            <div class="form-group">
                <input type="password" [(ngModel)]="newPassword" placeholder="New Password" class="form-input" />
            </div>
            <div class="form-group">
                <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirm New Password"
                    class="form-input" />
            </div>
            <button class="auth-btn" (click)="resetPassword()" [disabled]="loading">
                {{ loading ? 'Resetting...' : 'Reset Password' }}
            </button>
        </div>

        <!-- Step 3 -->
        <div *ngIf="step === 3" class="success-wrap">
            <div class="success-icon">✓</div>
            <h3>Password Reset Successful!</h3>
            <p>You can now login with your new password.</p>
            <a routerLink="/login" class="auth-btn" style="display:block; text-align:center; text-decoration:none;">
                Go to Login
            </a>
        </div>

    </div>
</div>
