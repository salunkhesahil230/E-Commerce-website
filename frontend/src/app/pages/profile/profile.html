<div class="profile-page">
    <div class="profile-container">

        <!-- Sidebar -->
        <div class="profile-sidebar">
            <div class="user-info">
                <div class="avatar">{{ user?.name?.charAt(0)?.toUpperCase() }}</div>
                <div>
                    <p class="user-name">{{ user?.name }}</p>
                    <p class="user-email">{{ user?.email }}</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item" [class.active]="activeTab === 'profile'" (click)="activeTab = 'profile'">
                    👤 Edit Profile
                </button>
                <button class="nav-item" [class.active]="activeTab === 'password'" (click)="activeTab = 'password'">
                    🔒 Change Password
                </button>
            </nav>
        </div>

        <!-- Content -->
        <div class="profile-content">

            <!-- Edit Profile -->
            <div class="content-card" *ngIf="activeTab === 'profile'">
                <h2 class="card-title">Edit Profile</h2>

                <div class="success-box" *ngIf="profileSuccess">{{ profileSuccess }}</div>
                <div class="error-box" *ngIf="profileError">{{ profileError }}</div>

                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" [(ngModel)]="name" class="form-input" placeholder="Enter your name" />
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" [(ngModel)]="email" class="form-input" placeholder="Enter your email" />
                </div>

                <button class="save-btn" (click)="updateProfile()" [disabled]="profileLoading">
                    {{ profileLoading ? 'Saving...' : 'Save Changes' }}
                </button>
            </div>

            <!-- Change Password -->
            <div class="content-card" *ngIf="activeTab === 'password'">
                <h2 class="card-title">Change Password</h2>

                <div class="success-box" *ngIf="passwordSuccess">{{ passwordSuccess }}</div>
                <div class="error-box" *ngIf="passwordError">{{ passwordError }}</div>

                <div class="form-group">
                    <label class="form-label">Current Password</label>
                    <input type="password" [(ngModel)]="currentPassword" class="form-input"
                        placeholder="Enter current password" />
                </div>

                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" [(ngModel)]="newPassword" class="form-input"
                        placeholder="Enter new password" />
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" [(ngModel)]="confirmPassword" class="form-input"
                        placeholder="Confirm new password" />
                </div>

                <button class="save-btn" (click)="changePassword()" [disabled]="passwordLoading">
                    {{ passwordLoading ? 'Changing...' : 'Change Password' }}
                </button>
            </div>

        </div>
    </div>
</div>
